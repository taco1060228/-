<!doctype html>
<html>
<head>
<meta charset="utf-8">
	<title>瀞塔羅牌線上占卜</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="step-1" class="step-container">
    <h2 class="step-title">第一步：冥想問題與選擇</h2>
    <div class="controls">
        <div class="question-zone">
            <input type="text" id="user-question" placeholder="在此輸入你想請教塔羅的問題..." maxlength="50">
        </div>
        
        <label for="deck-style">選擇牌組</label>
        <select id="deck-style">
            <option value="classic">古埃及塔羅牌</option>
            <option value="modern">萬年罡玉塔羅牌</option>
        </select>
        
		<label>牌陣</label>
		<div class="fixed-selection">三張牌陣 (過去、現在、未來)</div>
		<input type="hidden" id="draw-count" value="3">
        
        <button class="next-btn" onclick="prepareConfirmation()">下一步：確認資訊</button>
    </div>
<div id="deck-preview"></div>

<label for="draw-count">選擇牌陣</label>
</div>
<div id="step-confirm" class="step-container" style="display:none;">
    <button class="mini-back-btn" onclick="goToStep(1)">← 返回修改</button>
    
    <h2 class="step-title">確認占卜資訊</h2>
    
    <div class="confirm-box">
        <p><strong>您的問題：</strong> <span id="conf-question"></span></p>
        <p><strong>選用牌組：</strong> <span id="conf-deck"></span></p>
        <p><strong>選用牌陣：</strong> <span id="conf-count"></span></p>
    </div>
    
    <div class="btn-group">
        <button class="next-btn" onclick="goToStep(2)">確認無誤，開始洗牌</button>
    </div>
</div>

<div id="step-2" class="step-container" style="display:none;">
    <button class="mini-back-btn" onclick="resetToStep1()">← 返回修改</button>
    
    <h2 class="step-title">第二步：洗牌並抽取卡片</h2>
    <div class="controls">
        <div class="crystal-ball-wrapper">
            <button class="crystal-ball-btn" id="shuffle-btn" onclick="shuffleDeck()">
                <span class="btn-text">凝神<br>洗牌</span>
            </button>
        </div>
        <p id="status-msg">請觸碰水晶球注入能量</p>
    </div>
    <div id="deck-container"></div>
</div>

    <div id="step-3" class="step-container" style="display:none;">
        <h2 class="step-title">占卜結果</h2>
        <div id="result-area"></div>
        <button class="reset-btn" onclick="resetToStep1()">結束占卜，重新開始</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
